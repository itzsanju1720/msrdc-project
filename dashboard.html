<!DOCTYPE html>
<html>
<head>
    <title>My Dashboard</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .sidebar {
            width: 220px;
            height: 100vh;
            background: #222;
            color: white;
            position: fixed;
            padding-top: 20px;
        }

        .sidebar h2 {
            text-align: center;
        }

        .sidebar a {
            display: block;
            color: white;
            padding: 15px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background: #444;
        }

        .main {
            margin-left: 220px;
            padding: 20px;
        }

        .card-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .card {
            background: white;
            padding: 20px;
            width: 200px;
            border-radius: 10px;
            box-shadow: 0px 0px 5px gray;
        }

        .card h3 {
            margin: 0;
        }

        table {
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <h2>Dashboard</h2>
        <a href="#">Home</a>
        <a href="#" onclick="showUsers()">Users</a>
        <a href="#">Reports</a>
        <a href="#">Settings</a>
    </div>

    <div class="main">
        <h1>Welcome</h1>

        <div id="content"></div>

        <div class="card-container">
            <div class="card">
                <h3>Total Users</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Orders</h3>
                <p>80</p>
            </div>

            <div class="card">
                <h3>Revenue</h3>
                <p>₹50,000</p>
            </div>
        </div>
    </div>

    <script>
        function showUsers() {
            document.getElementById("content").innerHTML = `
                <h2>User Records</h2>

                <table>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                    </tr>

                    <tr><td>1</td><td>Rahul</td></tr>
                    <tr><td>2</td><td>Aman</td></tr>
                    <tr><td>3</td><td>Priya</td></tr>
                    <tr><td>4</td><td>Riya</td></tr>
                    <tr><td>5</td><td>Karan</td></tr>
                    <tr><td>6</td><td>Simran</td></tr>
                    <tr><td>7</td><td>Neha</td></tr>
                    <tr><td>8</td><td>Arjun</td></tr>
                    <tr><td>9</td><td>Pooja</td></tr>
                    <tr><td>10</td><td>Rohit</td></tr>
                </table>
            `;
        }
    </script>

</body>
</html>
