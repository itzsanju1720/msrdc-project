<!DOCTYPE html>

<html>
<head>
    <title>MSRDC Login</title>

```
<style>
    body{
        margin:0;
        font-family:Arial, sans-serif;
        background-image: url('bg.jpg');
        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
    }

    .login-box{
        width:320px;
        background:rgba(255,255,255,0.85);
        padding:30px;
        border-radius:12px;
        box-shadow:0 0 10px rgba(0,0,0,0.3);
    }

    h2{
        text-align:center;
        margin-bottom:20px;
    }

    input{
        width:100%;
        padding:12px;
        margin:10px 0;
        box-sizing:border-box;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        background:#2563eb;
        color:white;
        font-size:16px;
        border-radius:5px;
        cursor:pointer;
    }

    #msg{
        color:red;
        text-align:center;
    }
</style>
```

</head>

<body>

<div class="login-box">

```
<h2>MSRDC Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>
```

</div>

<script>
function login(){

    let u = document.getElementById("username").value;
    let p = document.getElementById("password").value;

    if(u === "admin" && p === "1234"){

        window.location.href =
        "https://xd.adobe.com/view/be12c25f-2649-4bc5-adf9-3ac37369f5bf-eb41/screen/4016ca74-190e-4290-9d4f-1e4db9af3af9/";

    }else{

        document.getElementById("msg").innerHTML =
        "Invalid Username or Password";

    }
}
</script>

</body>
</html>
